name: Update API Documentation

on:
  push:
    branches:
      - master

jobs:
  trigger-docai:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger DocAI service
        run: |
          curl -X POST http://DOC_AI_SERVER:8080/analyze \
          -H "Content-Type: application/json" \
          -d '{"commit": "${{ github.sha }}"}'
